name: Update PAC and Proxy Files

on:
  schedule:
    - cron: '0 0 * * *' # Автоматический запуск каждую ночь в 00:00
  workflow_dispatch: # Позволяет запускать воркфлоу вручную кнопкой Run workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run generation script
      run: python generate_pac.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add antizapret.pac proxy.txt
        git diff-index --quiet HEAD || (git commit -m "Auto-update PAC and proxy files" && git push)
